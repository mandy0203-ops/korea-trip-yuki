<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- 背景：奶油色圓角方塊（iOS 會再次圓角，做雙保險）-->
  <rect width="180" height="180" rx="40" fill="#faf5ec"/>

  <!-- 葉子（左上）-->
  <g transform="translate(40, 50) rotate(-25)">
    <path d="M 0 8 Q 18 -8 38 4 Q 36 26 14 26 Q 4 20 0 8 Z"
          fill="#b8c9a3" stroke="#3a2820" stroke-width="4.5" stroke-linejoin="round"/>
    <path d="M 6 12 L 32 6" stroke="#3a2820" stroke-width="2.8"
          stroke-linecap="round" fill="none"/>
  </g>

  <!-- 葉子（右下）-->
  <g transform="translate(115, 115) rotate(35)">
    <path d="M 0 8 Q 20 -6 42 6 Q 38 28 16 28 Q 5 22 0 8 Z"
          fill="#a9bf95" stroke="#3a2820" stroke-width="4.5" stroke-linejoin="round"/>
    <path d="M 6 12 L 36 8" stroke="#3a2820" stroke-width="2.8"
          stroke-linecap="round" fill="none"/>
  </g>

  <!-- 主花朵：8 個花瓣手繪感 -->
  <g transform="translate(90, 90)">
    <path d="M 0,-50
             C 18,-54 32,-44 28,-28
             C 48,-32 60,-16 50,2
             C 60,20 46,38 28,32
             C 32,52 16,60 0,52
             C -16,60 -32,52 -28,32
             C -46,38 -60,20 -50,2
             C -60,-16 -48,-32 -28,-28
             C -32,-44 -18,-54 0,-50 Z"
          fill="#fefcf6"
          stroke="#3a2820"
          stroke-width="5"
          stroke-linejoin="round"/>

    <!-- 花心 -->
    <circle cx="0" cy="2" r="13"
            fill="#f0b95c"
            stroke="#3a2820"
            stroke-width="4"/>
  </g>
</svg>
